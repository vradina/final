<!DOCTYPE html>
<html>
<head>
  <title>Worcester Snow Forecast</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <link rel="stylesheet" href="main.css">
  <style>
    body {
      font-family: Georgia, serif;
      background: #f4f7fb;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 { font-size: 1.4rem; color: #1a1a2e; margin-bottom: 4px; }
    p.subtitle { color: #555; font-size: 0.9rem; margin-bottom: 24px; }
    #view { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  </style>
</head>
<body>
  <div>
    <h1>How Much Snow Might There Be</h1>
    <p class="subtitle">Each dot represents 1 out of 20 possible storms.</p>

    <div id="controls" style="text-align: center; margin-bottom: 20px;">
      <button id="toggleChart" type="button" style="padding: 8px 16px; background: #f0f0f0; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; font-size: 0.9rem;">Show Bar Chart</button>
    </div>

    <div id="view" style="max-width: 650px;"></div>

    <form id="snowForm">
      <label>What do you think? Enter your best guess for the chances (%) of each snowfall amount. Make sure they add up to 100.</label>

      <div class="field"><span>&lt; 0.1 in</span><input type="number" id="p_lt01" min="0" max="100" step="0.1" placeholder="0" required></div>
      <div class="field"><span>0.1–1 in</span><input type="number" id="p_01_1" min="0" max="100" step="0.1" placeholder="0" required></div>
      <div class="field"><span>1–2 in</span><input type="number" id="p_1_2" min="0" max="100" step="0.1" placeholder="0" required></div>
      <div class="field"><span>2–4 in</span><input type="number" id="p_2_4" min="0" max="100" step="0.1" placeholder="0" required></div>
      <div class="field"><span>4–6 in</span><input type="number" id="p_4_6" min="0" max="100" step="0.1" placeholder="0" required></div>
      <div class="field"><span>6–8 in</span><input type="number" id="p_6_8" min="0" max="100" step="0.1" placeholder="0" required></div>
      <div class="field"><span>8–12 in</span><input type="number" id="p_8_12" min="0" max="100" step="0.1" placeholder="0" required></div>
      <div class="field"><span>12–18 in</span><input type="number" id="p_12_18" min="0" max="100" step="0.1" placeholder="0" required></div>
      <div class="field"><span>≥ 18 in</span><input type="number" id="p_ge18" min="0" max="100" step="0.1" placeholder="0" required></div>

      <div id="sumWarn"></div>
      <div id="dotSummary" style="font-size:0.9rem; color:#333; margin: 12px 0;"></div>
      <button type="submit">Check My Forecast</button>
    </form>
  </div>

  <script>
    const N_DOTS = 20;

    const BINS = [
      { key: "lt01",  label: "<0.1",   x: 0 },
      { key: "01_1",  label: "0.1–1",  x: 1 },
      { key: "1_2",   label: "1–2",    x: 2 },
      { key: "2_4",   label: "2–4",    x: 3 },
      { key: "4_6",   label: "4–6",    x: 4 },
      { key: "6_8",   label: "6–8",    x: 5 },
      { key: "8_12",  label: "8–12",   x: 6 },
      { key: "12_18", label: "12–18",  x: 7 },
      { key: "ge18",  label: "≥18",    x: 8 }
    ];

    function getPercentsFromForm() {
      const ids = [
        "p_lt01","p_01_1","p_1_2","p_2_4","p_4_6","p_6_8","p_8_12","p_12_18","p_ge18"
      ];
      return ids.map(id => {
        const v = parseFloat(document.getElementById(id).value);
        return Number.isFinite(v) ? v : 0;
      });
    }

    // Largest Remainder Method: makes counts sum exactly to N_DOTS
    function percentsToCounts(percents, n=N_DOTS) {
      const raws = percents.map(p => (p * n) / 100);
      const floors = raws.map(r => Math.floor(r));
      let used = floors.reduce((a,b)=>a+b,0);
      let remaining = n - used;

      const remainders = raws.map((r,i)=>({ i, frac: r - floors[i] }));
      remainders.sort((a,b)=>b.frac - a.frac);

      const counts = floors.slice();
      for (let k = 0; k < remaining; k++) {
        counts[remainders[k].i] += 1;
      }
      return counts;
    }

    function buildDotData(percents) {
      const counts = percentsToCounts(percents, N_DOTS);
      const dots = [];
      for (let i = 0; i < BINS.length; i++) {
        for (let j = 0; j < counts[i]; j++) {
          dots.push({
            bin: BINS[i].label,
            binIndex: BINS[i].x,
            pos: j,
            p: percents[i]
          });
        }
      }
      return { dots, counts };
    }

    function createDotSpec(dotValues) {
      return {
        "$schema": "https://vega.github.io/schema/vega/v5.json",
        "width": 600,
        "height": 280,
        "padding": {"left": 110, "right": 20, "top": 10, "bottom": 10},

        "data": [
          { "name": "dots", "values": dotValues }
        ],

        "scales": [
          {
            "name": "x",
            "type": "linear",
            "domain": [-0.5, N_DOTS - 0.5],
            "range": "width"
          },
          {
            "name": "y",
            "type": "band",
            "domain": [0,1,2,3,4,5,6,7,8],
            "range": "height",
            "padding": 0.25
          }
        ],

        "axes": [
          {
            "scale": "y",
            "orient": "left",
            "title": "Snowfall bin (inches)",
            "values": [0,1,2,3,4,5,6,7,8],
            "labelExpr": "['<0.1','0.1–1','1–2','2–4','4–6','6–8','8–12','12–18','≥19'][datum.value]",
            "titleFont": "Georgia",
            "labelFont": "Georgia",
            "titleFontSize": 12
          }
        ],

        "marks": [
          {
            "type": "symbol",
            "from": {"data": "dots"},
            "encode": {
              "enter": {
                "x": {"scale": "x", "field": "pos"},
                "y": {"scale": "y", "field": "binIndex", "band": 0.5},
                "size": {"value": 220},
                "fill": {"value": "#6b5b95"},
                "stroke": {"value": "white"},
                "strokeWidth": {"value": 1.2},
                "tooltip": {"signal": "datum.bin + ': ' + datum.p + '% (' + round(datum.p * " + N_DOTS + " / 100) + ' of " + N_DOTS + ")'"}
              }
            }
          }
        ]
      };
    }

    function createBarSpec(percents) {
      return {
        "$schema": "https://vega.github.io/schema/vega/v5.json",
        "width": 600,
        "height": 280,
        "padding": {"left": 110, "right": 20, "top": 10, "bottom": 10},

        "data": [
          {
            "name": "bars",
            "values": BINS.map((bin, i) => ({
              "bin": bin.label,
              "binIndex": i,
              "percentage": percents[i]
            }))
          }
        ],

        "scales": [
          {
            "name": "y",
            "type": "band",
            "domain": [0,1,2,3,4,5,6,7,8],
            "range": "height",
            "padding": 0.25
          },
          {
            "name": "x",
            "type": "linear",
            "domain": [0, 100],
            "range": "width"
          }
        ],

        "axes": [
          {
            "scale": "y",
            "orient": "left",
            "title": "Snowfall bin (inches)",
            "values": [0,1,2,3,4,5,6,7,8],
            "labelExpr": "['<0.1','0.1–1','1–2','2–4','4–6','6–8','8–12','12–18','≥19'][datum.value]",
            "titleFont": "Georgia",
            "labelFont": "Georgia",
            "titleFontSize": 12
          },
          {
            "scale": "x",
            "orient": "bottom",
            "title": "Probability (%)",
            "titleFont": "Georgia",
            "labelFont": "Georgia",
            "titleFontSize": 12
          }
        ],

        "marks": [
          {
            "type": "rect",
            "from": {"data": "bars"},
            "encode": {
              "enter": {
                "y": {"scale": "y", "field": "binIndex"},
                "height": {"scale": "y", "band": true},
                "x": {"scale": "x", "value": 0},
                "x2": {"scale": "x", "field": "percentage"},
                "fill": {"value": "#6b5b95"},
                "tooltip": {"signal": "datum.bin + ': ' + datum.percentage + '%'"}
              }
            }
          },
          {
            "type": "text",
            "from": {"data": "bars"},
            "encode": {
              "enter": {
                "y": {"scale": "y", "field": "binIndex", "band": 0.5},
                "x": {"scale": "x", "field": "percentage", "offset": 5},
                "text": {"field": "percentage"},
                "align": {"value": "left"},
                "baseline": {"value": "middle"},
                "fill": {"value": "#333"},
                "fontSize": {"value": 11}
              }
            }
          }
        ]
      };
    }

    let currentChartType = 'dots';

    function renderFromPercents(percents) {
      const sum = percents.reduce((a,b)=>a+b,0);
      const warn = document.getElementById("sumWarn");

      // Allow tiny floating error
      if (Math.abs(sum - 100) > 0.01) {
        warn.textContent = `Percentages must sum to 100. Current sum: ${sum.toFixed(2)}%`;
        return;
      }
      warn.textContent = "";

      const { dots, counts } = buildDotData(percents);
      document.getElementById("dotSummary").textContent =
        "Dot mapping (out of 20): " +
        counts.map((c, i) => `${BINS[i].label}=${c}`).join(" • ");

      if (currentChartType === 'dots') {
        const spec = createDotSpec(dots);
        vegaEmbed('#view', spec, {actions: false});
      } else {
        const spec = createBarSpec(percents);
        vegaEmbed('#view', spec, {actions: false});
      }
    }

    // Default example (NYT-like)
    const defaultPercents = [1,6,17,12,11,15,21,12,5]; // sums 100
    const defaultIds = ["p_lt01","p_01_1","p_1_2","p_2_4","p_4_6","p_6_8","p_8_12","p_12_18","p_ge18"];
    defaultIds.forEach((id,i)=>document.getElementById(id).value = defaultPercents[i]);

    renderFromPercents(defaultPercents);

    document.getElementById("snowForm").addEventListener("submit", function(e){
      e.preventDefault();
      const percents = getPercentsFromForm();
      renderFromPercents(percents);
    });

    document.getElementById("toggleChart").addEventListener("click", function(){
      currentChartType = currentChartType === 'dots' ? 'bars' : 'dots';
      this.textContent = currentChartType === 'dots' ? 'Show Bar Chart' : 'Show Dot Plot';
      const percents = getPercentsFromForm();
      renderFromPercents(percents);
    });
  </script>

</body>
</html>
